name: grid-desk

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: grid_desk
      POSTGRES_USER: grid_desk
      POSTGRES_PASSWORD: grid_desk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid_desk -d grid_desk"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - grid-desk-data:/var/lib/postgresql/data

  collector:
    build: ./services/collector
    environment:
      DATABASE_URL: postgresql://grid_desk:grid_desk@postgres:5432/grid_desk
      CONED_EMAIL: ${CONED_EMAIL:-}
      CONED_PASSWORD: ${CONED_PASSWORD:-}
      CONED_TOTP_SECRET: ${CONED_TOTP_SECRET:-}
      CONED_ACCOUNT_URN: ${CONED_ACCOUNT_URN:-}
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-}
      POLL_SECONDS: ${POLL_SECONDS:-300}
      METER_KEY: ${METER_KEY:-home}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8001/health')
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${COLLECTOR_PORT:-8001}:8001"

  web:
    build: ./apps/web
    environment:
      DATABASE_URL: postgresql://grid_desk:grid_desk@postgres:5432/grid_desk
      DATABASE_SSL: disable
      WEATHER_LATITUDE: ${WEATHER_LATITUDE:-}
      WEATHER_LONGITUDE: ${WEATHER_LONGITUDE:-}
      ENERGY_RATE_PER_KWH: ${ENERGY_RATE_PER_KWH:-0.338}
      MONTHLY_FIXED_CHARGE: ${MONTHLY_FIXED_CHARGE:-17.80}
      METER_KEY: ${METER_KEY:-home}
    depends_on:
      collector:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  grid-desk-data:
